server:
  port: 8092

spring:
  application:
    name: telemetryhub-ingestion-service
  kafka:
    bootstrap-servers: localhost:9092

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

telemetryhub:
  ingestion:
    mqtt:
      enabled: false
      real-client-enabled: false
      broker-uri: tcp://localhost:1883
      client-id: telemetryhub-ingestion-service
      connection-timeout-seconds: 5
      subscriptions:
        - telemetryhub/devices/+/telemetry
        - telemetryhub/devices/+/device-health
        - telemetryhub/devices/+/driving-event
    publisher:
      mode: MEMORY
      kafka:
        enabled: false
        raw-topic: telemetryhub.raw-events
