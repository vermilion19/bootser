server:
  port: 8093

spring:
  application:
    name: telemetryhub-stream-processor
  kafka:
    bootstrap-servers: localhost:9092
    streams:
      application-id: telemetryhub-stream-processor

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

telemetryhub:
  stream:
    application-id: telemetryhub-stream-processor
    source-topic: telemetryhub.raw-events
    device-last-seen-window: 5m
    events-per-minute-window: 1m
    driving-event-counter-window: 1m
    region-heatmap-window: 1m
    late-event-grace: 2m
    heatmap-grid-size: 0.01
    num-stream-threads: 1
    processing-guarantee: at_least_once
    state-dir: ${java.io.tmpdir}/telemetryhub-streams
    num-standby-replicas: 0
    commit-interval-ms: 1000
    projection-batch:
      batch-size: 100
      flush-interval: 500ms
      max-buffered-entries: 5000
