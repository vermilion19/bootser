name: telemetry-hub

services:
  mqtt-broker:
    image: eclipse-mosquitto:2.0
    restart: unless-stopped
    ports:
      - "${MQTT_BROKER_PORT:-1883}:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - telemetryhub-mosquitto-data:/mosquitto/data
      - telemetryhub-mosquitto-log:/mosquitto/log
    networks:
      - telemetryhub

  edge:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - device-simulator
      - ingestion-service
      - stream-processor
      - analytics-api
    ports:
      - "${EDGE_DEVICE_SIMULATOR_PORT:-8091}:8091"
      - "${EDGE_INGESTION_SERVICE_PORT:-8092}:8092"
      - "${EDGE_STREAM_PROCESSOR_PORT:-8093}:8093"
      - "${EDGE_ANALYTICS_API_PORT:-8094}:8094"
    volumes:
      - ./nginx/telemetryhub-edge.conf:/etc/nginx/nginx.conf:ro
    networks:
      - telemetryhub

  device-simulator:
    build:
      context: ../../..
      dockerfile: apps/telemetryhub/docker/Dockerfile
      args:
        MODULE_TASK: ":apps:telemetryhub:device-simulator"
        MODULE_DIR: "apps/telemetryhub/device-simulator"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mqtt-broker
    env_file:
      - ./env/device-simulator.env
    expose:
      - "8091"
    networks:
      - telemetryhub
      - booster-network

  ingestion-service:
    build:
      context: ../../..
      dockerfile: apps/telemetryhub/docker/Dockerfile
      args:
        MODULE_TASK: ":apps:telemetryhub:ingestion-service"
        MODULE_DIR: "apps/telemetryhub/ingestion-service"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mqtt-broker
    env_file:
      - ./env/ingestion-service.env
    expose:
      - "8092"
    networks:
      - telemetryhub
      - booster-network

  stream-processor:
    build:
      context: ../../..
      dockerfile: apps/telemetryhub/docker/Dockerfile
      args:
        MODULE_TASK: ":apps:telemetryhub:stream-processor"
        MODULE_DIR: "apps/telemetryhub/stream-processor"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./env/stream-processor.env
    volumes:
      - type: volume
        target: /var/lib/telemetryhub-streams
    expose:
      - "8093"
    networks:
      - telemetryhub
      - booster-network

  analytics-api:
    build:
      context: ../../..
      dockerfile: apps/telemetryhub/docker/Dockerfile
      args:
        MODULE_TASK: ":apps:telemetryhub:analytics-api"
        MODULE_DIR: "apps/telemetryhub/analytics-api"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./env/analytics-api.env
    expose:
      - "8094"
    networks:
      - telemetryhub
      - booster-network

  batch-backfill:
    build:
      context: ../../..
      dockerfile: apps/telemetryhub/docker/Dockerfile
      args:
        MODULE_TASK: ":apps:telemetryhub:batch-backfill"
        MODULE_DIR: "apps/telemetryhub/batch-backfill"
    restart: unless-stopped
    profiles:
      - batch
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./env/batch-backfill.env
    expose:
      - "8095"
    networks:
      - telemetryhub
      - booster-network

  batch-edge:
    image: nginx:1.27-alpine
    restart: unless-stopped
    profiles:
      - batch
    depends_on:
      - batch-backfill
    ports:
      - "${EDGE_BATCH_BACKFILL_PORT:-8095}:8095"
    volumes:
      - ./nginx/telemetryhub-batch-edge.conf:/etc/nginx/nginx.conf:ro
    networks:
      - telemetryhub

volumes:
  telemetryhub-mosquitto-data:
  telemetryhub-mosquitto-log:

networks:
  telemetryhub:
  booster-network:
    external: true
    name: booster-network
