worker_processes auto;

events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 valid=30s ipv6=off;

  upstream device_simulator_upstream {
    zone device_simulator_upstream 64k;
    server device-simulator:8091 resolve;
  }

  upstream ingestion_service_upstream {
    zone ingestion_service_upstream 64k;
    server ingestion-service:8092 resolve;
  }

  upstream stream_processor_upstream {
    zone stream_processor_upstream 64k;
    server stream-processor:8093 resolve;
  }

  upstream analytics_api_upstream {
    zone analytics_api_upstream 64k;
    server analytics-api:8094 resolve;
  }

  server {
    listen 8091;

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://device_simulator_upstream;
    }
  }

  server {
    listen 8092;

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://ingestion_service_upstream;
    }
  }

  server {
    listen 8093;

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://stream_processor_upstream;
    }
  }

  server {
    listen 8094;

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://analytics_api_upstream;
    }
  }
}
