server:
  port: 8090

spring:
  application:
    name: query-burst

  profiles:
    active: local   # 기본 프로파일

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        jdbc:
          batch_size: 1000
          order_inserts: true
          order_updates: true
    open-in-view: false

# ========================================
# Actuator + Prometheus 설정
# ========================================
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true    # HTTP 요청 히스토그램 (p50, p95, p99 계산용)
        hikaricp.connections: true    # DB 커넥션 풀 히스토그램
      slo:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 1s, 5s   # SLO 버킷

logging:
  level:
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF
