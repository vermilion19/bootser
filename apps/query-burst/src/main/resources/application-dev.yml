server:
  address: 127.0.0.1

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: query-burst-group
      auto-offset-reset: earliest

  datasource:
    # reWriteBatchedInserts=true: N개 단건 INSERT → 단일 multi-row INSERT 변환 (핵심 성능 옵션)
    # p6spy로 래핑: jdbc:postgresql → jdbc:p6spy:postgresql
    url: jdbc:p6spy:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:query_burst}?reWriteBatchedInserts=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 60000


  jpa:
    hibernate:
      ddl-auto: update   # 테이블 자동 생성/수정
    show-sql: false      # Logback 필터 적용을 위해 off (org.hibernate.SQL 로거 사용)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        generate_statistics: true   # 쿼리 수행 시간 통계
        session.events.log.LOG_QUERIES_SLOWER_THAN_MS: 0  # 모든 쿼리 시간 로깅

logging:
  level:
    p6spy: INFO                                  # 쿼리 수행 시간 로깅
    org.hibernate.SQL: OFF                       # p6spy 사용 시 중복 방지
    org.hibernate.orm.jdbc.bind: TRACE           # 바인딩 파라미터 출력
    org.hibernate.stat: OFF                      # p6spy 사용 시 불필요

# 더미 데이터 적재 설정 (POST /api/data-init 으로 수동 실행)
data:
  init:
    member-count: 10000000  # 1,000만
    product-count: 1000000  # 100만
    order-count: 30000000   # 3,000만
    order-item-per-order: 3 # 주문당 평균 3건 → order_item 총 9,000만
    batch-size: 5000        # 배치당 레코드 수
    thread-count: 8         # 병렬 스레드 수 (hikari pool size 20 이하 권장)
