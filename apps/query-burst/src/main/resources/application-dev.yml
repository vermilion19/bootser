server:
  address: 127.0.0.1

spring:
  datasource:
    # reWriteBatchedInserts=true: N개 단건 INSERT → 단일 multi-row INSERT 변환 (핵심 성능 옵션)
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:query_burst}?reWriteBatchedInserts=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 60000


  jpa:
    hibernate:
      ddl-auto: update   # 테이블 자동 생성/수정
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        generate_statistics: true   # 쿼리 수행 시간 통계
        session.events.log.LOG_QUERIES_SLOWER_THAN_MS: 0  # 모든 쿼리 시간 로깅

logging:
  level:
    org.hibernate.SQL: DEBUG                    # SQL 쿼리 출력
    org.hibernate.orm.jdbc.bind: TRACE          # 바인딩 파라미터 출력
    org.hibernate.stat: DEBUG                   # 수행 시간 통계 출력

# 더미 데이터 적재 설정 (POST /api/data-init 으로 수동 실행)
data:
  init:
    member-count: 10000000  # 1,000만
    product-count: 1000000  # 100만
    order-count: 30000000   # 3,000만
    order-item-per-order: 3 # 주문당 평균 3건 → order_item 총 9,000만
    batch-size: 5000        # 배치당 레코드 수
    thread-count: 8         # 병렬 스레드 수 (hikari pool size 20 이하 권장)
