spring:
  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: query-burst-group
      auto-offset-reset: earliest

  datasource:
    url: jdbc:h2:mem:query_burst;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true   # http://localhost:8090/h2-console

  flyway:
    enabled: false   # local은 H2 create-drop으로 관리

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        # 0ms 이상 걸린 모든 쿼리를 실행 시간과 함께 로그 출력
        session.events.log.LOG_QUERIES_SLOWER_THAN_MS: 0

logging:
  level:
    org.hibernate.SQL: DEBUG              # 실행 SQL
    org.hibernate.orm.jdbc.bind: TRACE    # 바인딩 파라미터
    org.hibernate.SQL_SLOW: INFO          # 실행 시간