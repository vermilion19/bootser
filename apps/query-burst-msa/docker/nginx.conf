worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 5s;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr response_time=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # 커넥션 최적화
    keepalive_timeout 65;
    keepalive_requests 1000;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";
    proxy_connect_timeout 5s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # Upstream keepalive
    upstream analytics_backend {
        server analytics-service:18111;
        keepalive 32;
    }
    upstream ranking_backend {
        server ranking-service:18112;
        keepalive 32;
    }
    upstream catalog_backend {
        server catalog-service:18113;
        keepalive 32;
    }
    upstream member_backend {
        server member-service:18114;
        keepalive 32;
    }
    upstream order_backend {
        server order-service:18115;
        keepalive 32;
    }

    # analytics-service (18111)
    server {
        listen 18111;
        location / {
            proxy_pass http://analytics_backend;
        }
    }

    # ranking-service (18112)
    server {
        listen 18112;
        location / {
            proxy_pass http://ranking_backend;
        }
    }

    # catalog-service (18113)
    server {
        listen 18113;
        location / {
            proxy_pass http://catalog_backend;
        }
    }

    # member-service (18114)
    server {
        listen 18114;
        location / {
            proxy_pass http://member_backend;
        }
    }

    # order-service (18115)
    server {
        listen 18115;
        location / {
            proxy_pass http://order_backend;
        }
    }
}