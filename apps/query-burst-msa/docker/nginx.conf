worker_processes auto;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 5s;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr response_time=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # analytics-service (18111)
    server {
        listen 18111;
        location / {
            set $upstream analytics-service:18111;
            proxy_pass http://$upstream;
        }
    }

    # ranking-service (18112)
    server {
        listen 18112;
        location / {
            set $upstream ranking-service:18112;
            proxy_pass http://$upstream;
        }
    }

    # catalog-service (18113)
    server {
        listen 18113;
        location / {
            set $upstream catalog-service:18113;
            proxy_pass http://$upstream;
        }
    }

    # member-service (18114)
    server {
        listen 18114;
        location / {
            set $upstream member-service:18114;
            proxy_pass http://$upstream;
        }
    }

    # order-service (18115)
    server {
        listen 18115;
        location / {
            set $upstream order-service:18115;
            proxy_pass http://$upstream;
        }
    }
}