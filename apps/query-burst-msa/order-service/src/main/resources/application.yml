spring:
  application:
    name: query-burst-order-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:query_burst_order}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: query-burst-msa-order
      auto-offset-reset: earliest
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 18115
  tomcat:
    threads:
      max: 400
      min-spare: 50
    accept-count: 100
    max-connections: 8192

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
        "[hikaricp.connections]": true
      slo:
        "[http.server.requests]": 50, 100, 200, 500, 1000, 5000
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${TEMPO_ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

loki:
  url: ${LOKI_URL:http://localhost:3100/loki/api/v1/push}

query-burst-msa:
  clients:
    catalog:
      base-url: http://localhost:18113

data:
  init:
    order-count: 3000000
    order-item-per-order: 3
    batch-size: 5000
