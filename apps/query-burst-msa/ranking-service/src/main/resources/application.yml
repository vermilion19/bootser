spring:
  application:
    name: query-burst-ranking-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: query-burst-msa-ranking
      auto-offset-reset: earliest
  jpa:
    open-in-view: false

server:
  port: 18112
  tomcat:
    threads:
      max: 400
      min-spare: 50
    accept-count: 100
    max-connections: 8192

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
      slo:
        "[http.server.requests]": 50, 100, 200, 500, 1000, 5000
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${TEMPO_ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

loki:
  url: ${LOKI_URL:http://localhost:3100/loki/api/v1/push}

data:
  init:
    window-hours: 24
    products-per-hour: 5000
