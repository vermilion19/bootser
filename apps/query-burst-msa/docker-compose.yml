name: query-burst-msa

services:
  analytics-service:
    build:
      context: ../..
      dockerfile: apps/query-burst-msa/docker/service.Dockerfile
      args:
        SERVICE_MODULE: analytics-service
    container_name: query-burst-msa-analytics-service
    restart: "no"
    environment:
      DB_HOST: booster-postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: query_burst_analytics
      KAFKA_BOOTSTRAP_SERVERS: booster-kafka:9092
      TEMPO_ZIPKIN_ENDPOINT: ${TEMPO_ZIPKIN_ENDPOINT:-http://tempo:9411/api/v2/spans}
      LOKI_URL: ${LOKI_URL:-http://loki:3100/loki/api/v1/push}
    ports:
      - "18111:18111"
    networks:
      - booster-network

  ranking-service:
    build:
      context: ../..
      dockerfile: apps/query-burst-msa/docker/service.Dockerfile
      args:
        SERVICE_MODULE: ranking-service
    container_name: query-burst-msa-ranking-service
    restart: "no"
    environment:
      REDIS_HOST: booster-redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: booster-kafka:9092
      TEMPO_ZIPKIN_ENDPOINT: ${TEMPO_ZIPKIN_ENDPOINT:-http://tempo:9411/api/v2/spans}
      LOKI_URL: ${LOKI_URL:-http://loki:3100/loki/api/v1/push}
    ports:
      - "18112:18112"
    networks:
      - booster-network

  catalog-service:
    build:
      context: ../..
      dockerfile: apps/query-burst-msa/docker/service.Dockerfile
      args:
        SERVICE_MODULE: catalog-service
    container_name: query-burst-msa-catalog-service
    restart: "no"
    environment:
      DB_HOST: booster-postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: query_burst_catalog
      TEMPO_ZIPKIN_ENDPOINT: ${TEMPO_ZIPKIN_ENDPOINT:-http://tempo:9411/api/v2/spans}
      LOKI_URL: ${LOKI_URL:-http://loki:3100/loki/api/v1/push}
    ports:
      - "18113:18113"
    networks:
      - booster-network

  member-service:
    build:
      context: ../..
      dockerfile: apps/query-burst-msa/docker/service.Dockerfile
      args:
        SERVICE_MODULE: member-service
    container_name: query-burst-msa-member-service
    restart: "no"
    environment:
      DB_HOST: booster-postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: query_burst_member
      TEMPO_ZIPKIN_ENDPOINT: ${TEMPO_ZIPKIN_ENDPOINT:-http://tempo:9411/api/v2/spans}
      LOKI_URL: ${LOKI_URL:-http://loki:3100/loki/api/v1/push}
    ports:
      - "18114:18114"
    networks:
      - booster-network

  order-service:
    build:
      context: ../..
      dockerfile: apps/query-burst-msa/docker/service.Dockerfile
      args:
        SERVICE_MODULE: order-service
    container_name: query-burst-msa-order-service
    restart: "no"
    environment:
      DB_HOST: booster-postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: query_burst_order
      KAFKA_BOOTSTRAP_SERVERS: booster-kafka:9092
      QUERY_BURST_MSA_CLIENTS_CATALOG_BASE_URL: http://catalog-service:18113
      TEMPO_ZIPKIN_ENDPOINT: ${TEMPO_ZIPKIN_ENDPOINT:-http://tempo:9411/api/v2/spans}
      LOKI_URL: ${LOKI_URL:-http://loki:3100/loki/api/v1/push}
    ports:
      - "18115:18115"
    networks:
      - booster-network

networks:
  booster-network:
    external: true
    name: booster-network
