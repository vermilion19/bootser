name: query-burst-msa

services:
  analytics-service:
    build:
      context: ../..
      dockerfile: apps/query-burst-msa/docker/service.Dockerfile
      args:
        SERVICE_MODULE: analytics-service
    restart: "no"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: booster-postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: query_burst_analytics
      KAFKA_BOOTSTRAP_SERVERS: booster-kafka:9092
      TEMPO_ZIPKIN_ENDPOINT: ${TEMPO_ZIPKIN_ENDPOINT:-http://tempo:9411/api/v2/spans}
      LOKI_URL: ${LOKI_URL:-http://loki:3100/loki/api/v1/push}
    networks:
      - booster-network

  ranking-service:
    build:
      context: ../..
      dockerfile: apps/query-burst-msa/docker/service.Dockerfile
      args:
        SERVICE_MODULE: ranking-service
    restart: "no"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REDIS_HOST: booster-redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: booster-kafka:9092
      TEMPO_ZIPKIN_ENDPOINT: ${TEMPO_ZIPKIN_ENDPOINT:-http://tempo:9411/api/v2/spans}
      LOKI_URL: ${LOKI_URL:-http://loki:3100/loki/api/v1/push}
    networks:
      - booster-network

  catalog-service:
    build:
      context: ../..
      dockerfile: apps/query-burst-msa/docker/service.Dockerfile
      args:
        SERVICE_MODULE: catalog-service
    restart: "no"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: booster-postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: query_burst_catalog
      REDIS_HOST: booster-redis
      REDIS_PORT: 6379
      TEMPO_ZIPKIN_ENDPOINT: ${TEMPO_ZIPKIN_ENDPOINT:-http://tempo:9411/api/v2/spans}
      LOKI_URL: ${LOKI_URL:-http://loki:3100/loki/api/v1/push}
    networks:
      - booster-network

  member-service:
    build:
      context: ../..
      dockerfile: apps/query-burst-msa/docker/service.Dockerfile
      args:
        SERVICE_MODULE: member-service
    restart: "no"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: booster-postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: query_burst_member
      TEMPO_ZIPKIN_ENDPOINT: ${TEMPO_ZIPKIN_ENDPOINT:-http://tempo:9411/api/v2/spans}
      LOKI_URL: ${LOKI_URL:-http://loki:3100/loki/api/v1/push}
    networks:
      - booster-network

  order-service:
    build:
      context: ../..
      dockerfile: apps/query-burst-msa/docker/service.Dockerfile
      args:
        SERVICE_MODULE: order-service
    restart: "no"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: booster-postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: query_burst_order
      KAFKA_BOOTSTRAP_SERVERS: booster-kafka:9092
      QUERY_BURST_MSA_CLIENTS_CATALOG_BASE_URL: http://catalog-service:18113
      TEMPO_ZIPKIN_ENDPOINT: ${TEMPO_ZIPKIN_ENDPOINT:-http://tempo:9411/api/v2/spans}
      LOKI_URL: ${LOKI_URL:-http://loki:3100/loki/api/v1/push}
    networks:
      - booster-network

  nginx:
    image: nginx:1.27-alpine
    restart: "no"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "18111:18111"
      - "18112:18112"
      - "18113:18113"
      - "18114:18114"
      - "18115:18115"
    depends_on:
      - analytics-service
      - ranking-service
      - catalog-service
      - member-service
      - order-service
    networks:
      booster-network:
        aliases:
          - query-burst-nginx  # k6 등 외부 컨테이너가 booster-network에서 Nginx에 접근할 때 사용

networks:
  booster-network:
    external: true
    name: booster-network
