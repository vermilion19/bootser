spring:
  application:
    name: query-burst-member-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:query_burst_member}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 18114

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
        "[hikaricp.connections]": true
      slo:
        "[http.server.requests]": 50, 100, 200, 500, 1000, 5000
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${TEMPO_ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

loki:
  url: ${LOKI_URL:http://localhost:3100/loki/api/v1/push}

data:
  init:
    member-count: 1000000
    batch-size: 5000
