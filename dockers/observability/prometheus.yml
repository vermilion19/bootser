global:
  scrape_interval: 5s

scrape_configs:
  # query-burst (독립 서비스) - host.docker.internal로 호스트 접근
  - job_name: 'query-burst'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['host.docker.internal:8090']
        labels:
          application: query-burst

  - job_name: 'query-burst-msa'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['host.docker.internal:18111']
        labels:
          application: query-burst-analytics-service
      - targets: ['host.docker.internal:18112']
        labels:
          application: query-burst-ranking-service
      - targets: ['host.docker.internal:18113']
        labels:
          application: query-burst-catalog-service
      - targets: ['host.docker.internal:18114']
        labels:
          application: query-burst-member-service
      - targets: ['host.docker.internal:18115']
        labels:
          application: query-burst-order-service
