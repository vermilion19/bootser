global:
  scrape_interval: 5s

scrape_configs:
  # query-burst (독립 서비스) - host.docker.internal로 호스트 접근
  - job_name: 'query-burst'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['host.docker.internal:8090']
        labels:
          application: query-burst

  # query-burst-msa 서비스들
  # dns_sd_configs: --scale로 늘어난 인스턴스를 자동 감지하여 각각 별도 타겟으로 등록
  # Prometheus는 booster-network에 속해있으므로 서비스명으로 직접 DNS 조회 가능

  - job_name: 'query-burst-analytics-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    dns_sd_configs:
      - names: ['analytics-service']
        type: A
        port: 18111
        refresh_interval: 10s
    relabel_configs:
      - target_label: application
        replacement: query-burst-analytics-service

  - job_name: 'query-burst-ranking-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    dns_sd_configs:
      - names: ['ranking-service']
        type: A
        port: 18112
        refresh_interval: 10s
    relabel_configs:
      - target_label: application
        replacement: query-burst-ranking-service

  - job_name: 'query-burst-catalog-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    dns_sd_configs:
      - names: ['catalog-service']
        type: A
        port: 18113
        refresh_interval: 10s
    relabel_configs:
      - target_label: application
        replacement: query-burst-catalog-service

  - job_name: 'query-burst-member-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    dns_sd_configs:
      - names: ['member-service']
        type: A
        port: 18114
        refresh_interval: 10s
    relabel_configs:
      - target_label: application
        replacement: query-burst-member-service

  - job_name: 'query-burst-order-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    dns_sd_configs:
      - names: ['order-service']
        type: A
        port: 18115
        refresh_interval: 10s
    relabel_configs:
      - target_label: application
        replacement: query-burst-order-service
